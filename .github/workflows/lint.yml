name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck
      # NOTE: `npm run lint` is intentionally NOT run here. The repo
      # currently has ~21 ESLint errors / ~108 warnings that are real
      # findings (not formatting). Adding lint as a gate without first
      # triaging those would block every PR. Re-enable in a follow-up
      # once the backlog is cleared (or scoped via --max-warnings).
