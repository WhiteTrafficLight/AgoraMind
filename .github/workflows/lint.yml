name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

      # ESLint with a strict warning cap. Current baseline is 124
      # warnings (post the rule demotions in eslint.config.mjs — see
      # the comment block there for what's demoted and why). Hitting
      # 125 fails CI, forcing either a fix or a conscious raise of
      # the cap. Errors fail CI unconditionally.
      - name: ESLint
        run: npm run lint -- --max-warnings 124
